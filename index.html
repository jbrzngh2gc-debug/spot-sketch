<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spot Sketch SIMPLE</title>

<style>
html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#111;
color:white;
}

#topbar{
display:flex;
gap:10px;
padding:6px 10px;
background:#0f0f0f;
width:100%;
justify-content:center;
align-items:center;
font-size:12px;
flex-wrap:wrap;
}

input,select,button{
background:#151515;
border:1px solid #2a2a2a;
color:white;
padding:5px 8px;
border-radius:6px;
font-size:12px;
}

#canvas{
width:100vw;
height:calc(100vh - 52px);
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
}

#stage{
position:relative;
display:inline-block;
}

#photo{
display:block;
max-width:100vw;
max-height:calc(100vh - 52px);
width:auto;
height:auto;
object-fit:contain;
}

.bubble{
position:absolute;
background:#2f8cff;
color:white;
padding:6px 10px;
border-radius:10px;
font-weight:bold;
user-select:none;
transform:translate(-50%,-50%);
white-space:nowrap;
}
</style>
</head>

<body>

<div id="topbar">
<input id="project" placeholder="Project"/>
<select id="iso"></select>
<select id="shutter"></select>
<input type="file" id="file">
<button onclick="exportImg()">Export</button>
</div>

<div id="canvas">
  <div id="stage">
    <img id="photo">
  </div>
</div>

<script>
const stage = document.getElementById("stage");
const img = document.getElementById("photo");

let points = [];
let click = {x:0,y:0};

/* ISO */
const isoSel = document.getElementById("iso");
[12,25,50,100,200,400,800,1600,3200,6400,12800].forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent="ISO " + v;
isoSel.appendChild(o);
});
isoSel.value=200;

/* SHUTTER */
const shSel = document.getElementById("shutter");
[
"2 min","1 min","30","15","8","4","2","1",
"1/2","1/4","1/8","1/15","1/30","1/60",
"1/125","1/250","1/500","1/1000","1/2000","1/4000","1/8000"
].forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v;
shSel.appendChild(o);
});
shSel.value="1/250";

/* IMAGE */
document.getElementById("file").onchange=e=>{
img.src = URL.createObjectURL(e.target.files[0]);
};

/* CLICK */
stage.addEventListener("click", e => {
if(e.target !== img) return;

const rect = stage.getBoundingClientRect();

click.x = e.clientX - rect.left;
click.y = e.clientY - rect.top;

openMenu(e.pageX, e.pageY);
});

/* MENU */
function openMenu(x,y){

const old = document.getElementById("menu");
if(old) old.remove();

const menu=document.createElement("div");
menu.id="menu";
menu.style.position="absolute";
menu.style.left=x+"px";
menu.style.top=y+"px";
menu.style.background="#1a1a1a";
menu.style.border="1px solid #333";
menu.style.zIndex=9999;
menu.style.minWidth="120px";

document.body.appendChild(menu);

const fvals=[
"f/0.7","f/0.8","f/1","f/1.2","f/1.4","f/1.8","f/2","f/2.2","f/2.5","f/2.8",
"f/3.2","f/3.5","f/4","f/4.5","f/5.6","f/6.3","f/7.1","f/8",
"f/9","f/10","f/11","f/13","f/14","f/16","f/18","f/20",
"f/22","f/25","f/29","f/32","f/36","f/40","f/45","f/51",
"f/57","f/64","f/72","f/81","f/90","f/102","f/114","f/128",
"f/144","f/160","f/180","f/200","f/225","f/256"
];

fvals.forEach(f=>{
const d=document.createElement("div");
d.textContent=f;
d.style.padding="8px";
d.style.cursor="pointer";
d.style.fontSize="12px";

d.onmouseenter=()=>d.style.background="#2f8cff";
d.onmouseleave=()=>d.style.background="transparent";

d.onclick=()=>{
createPoint(f);
menu.remove();
};

menu.appendChild(d);
});
}

/* CREATE POINT */
function createPoint(f){

const bubble=document.createElement("div");
bubble.className="bubble";
bubble.textContent=f;

bubble.style.left = click.x + "px";
bubble.style.top = click.y + "px";

stage.appendChild(bubble);

points.push({x:click.x, y:click.y, f});
}

/* EXPORT */
function exportImg(){

const c=document.createElement("canvas");
const ctx=c.getContext("2d");

c.width=img.naturalWidth;
c.height=img.naturalHeight;

ctx.drawImage(img,0,0);

const sx=c.width/img.offsetWidth;
const sy=c.height/img.offsetHeight;

/* HEADER BAR */
const headerH = 60;

ctx.fillStyle="#0b0b0b";
ctx.fillRect(0,0,c.width,headerH);

ctx.fillStyle="white";
ctx.font="14px Arial";
ctx.textBaseline="middle";

/* LEFT */
ctx.textAlign="left";
ctx.fillText(
document.getElementById("project").value || "Untitled",
20,
headerH/2
);

/* CENTER */
ctx.textAlign="center";
ctx.fillText(
"ISO " + isoSel.value,
c.width/2,
headerH/2
);

/* RIGHT */
ctx.textAlign="right";
ctx.fillText(
shSel.value,
c.width - 20,
headerH/2
);

/* POINTS */
points.forEach(p=>{
const x=p.x*sx;
const y=p.y*sy;

const text=p.f;

ctx.font="12px Arial";

const pad=8;
const w=ctx.measureText(text).width + pad*2;
const h=22;

ctx.fillStyle="#2f8cff";
ctx.beginPath();
ctx.roundRect(x - w/2, y - h/2, w, h, 8);
ctx.fill();

ctx.fillStyle="white";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(text, x, y);
});

const a=document.createElement("a");
a.href=c.toDataURL("image/png");
a.download="spot-sketch.png";
a.click();
}
</script>

</body>
</html>spot-sketch
