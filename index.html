<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spot Sketch</title>

<style>
html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#111;
color:white;
}

#topbar{
display:flex;
gap:8px;
padding:6px 10px;
background:#0f0f0f;
width:100%;
justify-content:center;
align-items:center;
font-size:12px;
flex-wrap:wrap;
height:52px;
box-sizing:border-box;
}

input,select,button{
background:#151515;
border:1px solid #2a2a2a;
color:white;
padding:5px 8px;
border-radius:6px;
font-size:12px;
}

#footer{
height:52px;
background:#0f0f0f;
width:100%;
}

#canvas{
position:relative;
width:100vw;
height:calc(100vh - 104px); /* header + footer */
background:#000;
overflow:hidden;
}

#photo{
position:absolute;
top:01%;
left:50%;
transform:translate(-50%,-1%);
max-width:100%;
max-height:100%;
width:auto;
height:auto;
}

.bubble{
position:absolute;
background:#2f8cff;
color:white;
padding:6px 10px;
border-radius:10px;
font-size:12px;
font-weight:bold;
transform:translate(-50%,-50%);
white-space:nowrap;
user-select:none;
}

.bubble .del{
margin-left:6px;
cursor:pointer;
font-weight:bold;
}

#menu{
position:absolute;
display:none;
background:#1a1a1a;
border:1px solid #333;
z-index:9999;
min-width:120px;
}

.menu-item{
padding:8px;
cursor:pointer;
font-size:12px;
}

.menu-item:hover{
background:#2f8cff;
}
</style>
</head>

<body>

<div id="topbar">
<input id="project" placeholder="Project"/>
<select id="iso"></select>
<select id="shutter"></select>
<input type="file" id="file">
<button onclick="exportImg()">Export</button>
</div>

<div id="canvas">
<img id="photo">
</div>
<div id="footer"></div>
<div id="menu"></div>

<script>
const img = document.getElementById("photo");
const canvas = document.getElementById("canvas");
const menu = document.getElementById("menu");

let points = [];
let click = {x:0,y:0};

/* ISO */
const isoSel = document.getElementById("iso");
[12,25,50,100,200,400,800,1600,3200,6400,12800].forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent="ISO " + v;
isoSel.appendChild(o);
});
isoSel.value=200;

/* SHUTTER */
const shSel = document.getElementById("shutter");
[
"2 min","1 min","30","15","8","4","2","1",
"1/2","1/4","1/8","1/15","1/30","1/60",
"1/125","1/250","1/500","1/1000","1/2000","1/4000","1/8000"
].forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v;
shSel.appendChild(o);
});
shSel.value="1/250";

/* IMAGE LOAD */
document.getElementById("file").onchange=e=>{
img.src = URL.createObjectURL(e.target.files[0]);
};

/* CLICK */
canvas.addEventListener("click", e=>{
if(e.target !== img) return;

const rect = img.getBoundingClientRect();

click.x = (e.clientX - rect.left) / rect.width;
click.y = (e.clientY - rect.top) / rect.height;

openMenu(e.pageX, e.pageY);
});

/* MENU */
function openMenu(x,y){
menu.innerHTML="";
menu.style.left=x+"px";
menu.style.top=y+"px";
menu.style.display="block";

["f/1","f/1.4","f/2","f/2.8","f/4","f/5.6","f/8","f/11","f/16","f/22","f/32","f/45","f/64","f/128","f/256"]
.forEach(f=>{
const d=document.createElement("div");
d.className="menu-item";

d.textContent=f;

d.onclick=()=>{
createPoint(f);
menu.style.display="none";
};

menu.appendChild(d);
});
}

/* 🔥 CREATE (FIXED DELETE + DRAG) */
function createPoint(f){

const bubble = document.createElement("div");
bubble.className = "bubble";
bubble.innerHTML = `<span>${f}</span> <span class="del">×</span>`;

document.body.appendChild(bubble);

const rect = img.getBoundingClientRect();

let point = {
x: click.x,
y: click.y,
f: f,
el: bubble
};

points.push(point);

/* position update */
function update(){
const r = img.getBoundingClientRect();
bubble.style.left = (point.x * r.width + r.left) + "px";
bubble.style.top  = (point.y * r.height + r.top) + "px";
}
update();

/* DELETE */
bubble.querySelector(".del").onclick = (e)=>{
e.stopPropagation();
bubble.remove();
points = points.filter(p => p !== point);
};

/* DRAG */
let dragging = false;
let offsetX = 0;
let offsetY = 0;

bubble.addEventListener("mousedown", (e)=>{
dragging = true;
const imgRect = img.getBoundingClientRect();

/* buborék középpontja image koordinátában */
const bubbleCenterX = point.x * imgRect.width + imgRect.left;
const bubbleCenterY = point.y * imgRect.height + imgRect.top;

/* egységes anchor: KÖZÉP */
offsetX = e.clientX - bubbleCenterX;
offsetY = e.clientY - bubbleCenterY;


e.preventDefault();
});

document.addEventListener("mousemove", (e)=>{
if(!dragging) return;

const r = img.getBoundingClientRect();

let nx = e.clientX - r.left - offsetX;
let ny = e.clientY - r.top - offsetY;

point.x = nx / r.width;
point.y = ny / r.height;

update();
});

document.addEventListener("mouseup", ()=>{
dragging = false;
});

}

/* RENDER */
function render(){
const r = img.getBoundingClientRect();

points.forEach(p=>{
if(!p.el) return;
p.el.style.left = (p.x * r.width + r.left) + "px";
p.el.style.top  = (p.y * r.height + r.top) + "px";
});
}

window.addEventListener("resize", render);
img.onload = render;

/* EXPORT */
function exportImg(){

const c=document.createElement("canvas");
const ctx=c.getContext("2d");

c.width=img.naturalWidth;
c.height=img.naturalHeight;

ctx.drawImage(img,0,0);

/* HEADER */
const h=60;

ctx.fillStyle="#0b0b0b";
ctx.fillRect(0,0,c.width,h);

ctx.fillStyle="white";
ctx.font="14px Arial";

ctx.textAlign="left";
ctx.textBaseline="middle";
ctx.fillText(document.getElementById("project").value||"Untitled",20,h/2);

ctx.textAlign="center";
ctx.fillText("ISO "+isoSel.value,c.width/2,h/2);

ctx.textAlign="right";
ctx.fillText(shSel.value,c.width-20,h/2);

/* 🔥 FIXED BUBBLES (REAL BOX, NOT CIRCLE) */
points.forEach(p=>{

const x = p.x * c.width;
const y = p.y * c.height;

const text = p.f;

ctx.font = "14px Arial";

const paddingX = 12;
const paddingY = 9;

const textW = ctx.measureText(text).width;
const boxW = textW + paddingX * 2;
const boxH = 22;

/* bubble background */
ctx.fillStyle = "#2f8cff";
roundRect(ctx, x - boxW/2, y - boxH/2, boxW, boxH, 8);
ctx.fill();

/* text */
ctx.fillStyle = "white";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText(text, x, y);

});

const a=document.createElement("a");
a.href=c.toDataURL("image/png");
a.download="spot-sketch.png";
a.click();
}

/* helper */
function roundRect(ctx,x,y,w,h,r){
ctx.beginPath();
ctx.moveTo(x+r,y);
ctx.arcTo(x+w,y,x+w,y+h,r);
ctx.arcTo(x+w,y+h,x,y+h,r);
ctx.arcTo(x,y+h,x,y,r);
ctx.arcTo(x,y,x+w,y,r);
ctx.closePath();
}
</script>

</body>
</html>
