<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spot Sketch</title>

<style>
*{
box-sizing:border-box;
}

html, body{
width:100%;
overflow-x:hidden;
}

html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#0f0f0f;
color:white;
}
body{
overflow:hidden;
height:100dvh;
}

#topbar{
display:flex;
gap:8px;
padding:6px 10px;
background:#0f0f0f;
width:100%;
max-width:100vw;

justify-content:center;
align-items:center;
font-size:12px;
flex-wrap:wrap;
height:52px;
box-sizing:border-box;
}

input,select,button{
background:#151515;
border:1px solid #2a2a2a;
color:white;
padding:5px 8px;
border-radius:6px;
font-size:12px;
}

#footer{
height:52px;
background:#0f0f0f;
width:100%;
}

#canvas{
position:relative;
width:100vw;
height:calc(100dvh - 104px); /* header + footer */
Background:#0f0f0f;
}

#photo{
display:none;
position:absolute;
Top:0px;
left:50%;
transform:translateX(-50%);
max-width:100%;
max-height:100%;
width:auto;
height:auto;
}




@media (max-width:768px){

#topbar{
height:auto;
min-height:52px;
padding:10px;
}

#canvas{
margin-top:12px;
height:calc(100dvh - 116px);
max-width:95%;
max-height:100%;
transform:translateX(-50%);
left:50%;
}

#footer{
height:52px;
}

}



.bubble{
position:absolute;
background:#2f8cff;
color:white;
padding:6px 10px;
border-radius:10px;
font-size:12px;
font-weight:bold;
transform:translate(-50%,-50%);
white-space:nowrap;
user-select:none;
}

.bubble .del{
margin-left:6px;
cursor:pointer;
font-weight:bold;
}

#modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.4);
backdrop-filter: blur(10px);
z-index:99999;
}

#modalBox{
width:80%;
max-height:60%;
overflow-y:auto;
background:rgba(30,30,30,0.7);
border:1px solid rgba(255,255,255,0.1);
border-radius:16px;
padding:10px;
backdrop-filter: blur(20px);
}

.modal-item{
padding:12px;
font-size:14px;
border-bottom:1px solid rgba(255,255,255,0.08);
cursor:pointer;
}

.modal-item:active{
background:rgba(47,140,255,0.4);
}


#menu{
position:absolute;
display:none;
background:#1a1a1a;
border:1px solid #333;
z-index:9999;
min-width:160px;

max-height:300px;
overflow-y:auto;
overflow-x:hidden;
}

.menu-item{
padding:8px;
cursor:pointer;
font-size:12px;
}

.menu-item:hover{
background:#2f8cff;
}
</style>
</head>

<body>

<div id="topbar">
<input id="project" placeholder="Project"/>
<select id="iso"></select>
<select id="shutter"></select>
<input type="file" id="file">
<button onclick="exportImg()">Export</button>
</div>

<div id="canvas">
<img id="photo">
</div>
<div id="footer"></div>
<div id="menu"></div>
<div id="modal">
  <div id="modalBox"></div>
</div>


<script>
const img = document.getElementById("photo");
const canvas = document.getElementById("canvas");
const menu = document.getElementById("menu");

let points = [];
let click = {x:0,y:0};

/* ISO */
const isoSel = document.getElementById("iso");
[12,25,50,100,200,400,800,1600,3200,6400,12800].forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent="ISO " + v;
isoSel.appendChild(o);
});
isoSel.value=200;

/* SHUTTER */
const shSel = document.getElementById("shutter");
[
"30","25","20","15","13","10","8","6","5","4","3.2","2.5","2","1.6","1.3","1","0.8","0.6","1/2","1/3","1/4","1/5","1/6","1/8","1/10","1/13","1/15","1/20","1/25","1/30","1/40","1/50","1/60","1/80","1/100","1/125","1/160","1/200","1/250","1/320","1/400","1/500","1/640","1/800","1/1000","1/1250","1/1600","1/2000","1/2500","1/3200","1/4000","1/5000","1/6400","1/8000"
].forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v;
shSel.appendChild(o);
});
shSel.value="1/125";

/* IMAGE LOAD */

img.onload = render;
img.onerror = () => {
img.style.display = "none";
};


document.getElementById("file").onchange=e=>{
img.src = URL.createObjectURL(e.target.files[0]);
img.style.display = "block";
};

/* CLICK */
canvas.addEventListener("click", e=>{
if(e.target !== img) return;

const rect = img.getBoundingClientRect();

click.x = (e.clientX - rect.left) / rect.width;
click.y = (e.clientY - rect.top) / rect.height;

openMenu(e.pageX, e.pageY);
});

/* MENU */
function openMenu(x,y){

const isMobile = window.innerWidth < 768;

const items = [
"ƒ / 0.7","ƒ / 0.8","ƒ / 1","ƒ / 1.1","ƒ / 1.2","ƒ / 1.4","ƒ / 1.6","ƒ / 1.8",
"ƒ / 2","ƒ / 2.2","ƒ / 2.5","ƒ / 2.8","ƒ / 3.2","ƒ / 3.5","ƒ / 4","ƒ / 4.5","ƒ / 5.0","ƒ / 5.6",
"ƒ / 6.3","ƒ / 7.1","ƒ / 8","ƒ / 9","ƒ / 10","ƒ / 11","ƒ / 13","ƒ / 14","ƒ / 16","ƒ / 18","ƒ / 20",
"ƒ / 22","ƒ / 25","ƒ / 29","ƒ / 32","ƒ / 36","ƒ / 40","ƒ / 45","ƒ / 51","ƒ / 57","ƒ / 64","ƒ / 72",
"ƒ / 81","ƒ / 91","ƒ / 102","ƒ / 114","ƒ / 128","ƒ / 144","ƒ / 162","ƒ / 181","ƒ / 204","ƒ / 256"
];

if(isMobile){

const modal = document.getElementById("modal");
const box = document.getElementById("modalBox");

box.innerHTML = "";

items.forEach(f=>{
const div = document.createElement("div");
div.className = "modal-item";
div.textContent = f;

div.onclick = ()=>{
createPoint(f);
modal.style.display = "none";
};

box.appendChild(div);
});

modal.style.display = "flex";

modal.onclick = (e)=>{
if(e.target === modal){
modal.style.display = "none";
}
};

return;
}

/* DESKTOP (régi dropdown marad) */
menu.innerHTML="";
menu.style.left=x+"px";
menu.style.top=y+"px";
menu.style.display="block";

items.forEach(f=>{
const d=document.createElement("div");
d.className="menu-item";
d.textContent=f;

d.onclick=()=>{
createPoint(f);
menu.style.display="none";
};

menu.appendChild(d);
});
}

/* 🔥 CREATE (FIXED DELETE + DRAG) */
function createPoint(f){

const bubble = document.createElement("div");
bubble.className = "bubble";
bubble.innerHTML = `<span>${f}</span> <span class="del">×</span>`;

document.body.appendChild(bubble);

const rect = img.getBoundingClientRect();

let point = {
x: click.x,
y: click.y,
f: f,
el: bubble
};

points.push(point);

/* position update */
function update(){
const r = img.getBoundingClientRect();
bubble.style.left = (point.x * r.width + r.left) + "px";
bubble.style.top  = (point.y * r.height + r.top) + "px";
}
update();

/* DELETE */
bubble.querySelector(".del").onclick = (e)=>{
e.stopPropagation();
bubble.remove();
points = points.filter(p => p !== point);
};

/* DRAG */
let dragging = false;
let offsetX = 0;
let offsetY = 0;

bubble.addEventListener("mousedown", (e)=>{
dragging = true;
const imgRect = img.getBoundingClientRect();

/* buborék középpontja image koordinátában */
const bubbleCenterX = point.x * imgRect.width + imgRect.left;
const bubbleCenterY = point.y * imgRect.height + imgRect.top;

/* egységes anchor: KÖZÉP */
offsetX = e.clientX - bubbleCenterX;
offsetY = e.clientY - bubbleCenterY;


e.preventDefault();
});

document.addEventListener("mousemove", (e)=>{
if(!dragging) return;

const r = img.getBoundingClientRect();

let nx = e.clientX - r.left - offsetX;
let ny = e.clientY - r.top - offsetY;

point.x = nx / r.width;
point.y = ny / r.height;

update();
});

document.addEventListener("mouseup", ()=>{
dragging = false;
});

}

/* RENDER */
function render(){
const r = img.getBoundingClientRect();

points.forEach(p=>{
if(!p.el) return;
p.el.style.left = (p.x * r.width + r.left) + "px";
p.el.style.top  = (p.y * r.height + r.top) + "px";
});
}

window.addEventListener("resize", render);
img.onload = render;

/* EXPORT */

async function exportImg(){

const c = document.createElement("canvas");
const ctx = c.getContext("2d");

c.width = img.naturalWidth;
c.height = img.naturalHeight;

ctx.drawImage(img,0,0);

/* =========================
   FIXED HEADER (1/20 height)
========================= */
const headerH = c.height / 20;

ctx.fillStyle = "#0b0b0b";
ctx.fillRect(0, 0, c.width, headerH);

const headerFont = headerH * 0.4;

const pad = c.width * 0.05; // <-- 5vw megfelelője export canvas-ban

ctx.fillStyle = "white";
ctx.font = `${headerFont}px Arial`;
ctx.textBaseline = "middle";

ctx.textAlign = "left";
ctx.fillText(
  document.getElementById("project").value || "Untitled",
  pad,
  headerH / 2
);

ctx.textAlign = "center";
ctx.fillText("ISO " + isoSel.value, c.width / 2, headerH / 2);

ctx.textAlign = "right";
ctx.fillText(
  shSel.value,
  c.width - pad,
  headerH / 2
);
/* =========================
   FIXED BUBBLES (NO SCALE HACK)
========================= */

const fontSize = c.height / 120;
const paddingX = fontSize * 0.8;
const paddingY = fontSize * 0.6;

ctx.font = `${fontSize}px Arial`;
ctx.textBaseline = "middle";

points.forEach(p => {

const x = p.x * c.width;
const y = p.y * c.height;

const text = p.f;

const textW = ctx.measureText(text).width;

const boxW = textW + paddingX * 2;
const boxH = fontSize + paddingY * 2;

ctx.fillStyle = "#2f8cff";
roundRect(
  ctx,
  x - boxW / 2,
  y - boxH / 2,
  boxW,
  boxH,
  fontSize * 0.4
);
ctx.fill();

ctx.fillStyle = "white";
ctx.textAlign = "center";
ctx.fillText(text, x, y);

});

/* =========================
   EXPORT
========================= */

const blob = await new Promise(res => c.toBlob(res, "image/png"));
const file = new File([blob], "spot-sketch.png", { type: "image/png" });

/* DESKTOP SAVE */
if (window.showSaveFilePicker){

try {
  const handle = await window.showSaveFilePicker({
    suggestedName: "spot-sketch.png",
    types: [{
      description: "PNG Image",
      accept: { "image/png": [".png"] }
    }]
  });

  const writable = await handle.createWritable();
  await writable.write(file);
  await writable.close();
  return;

} catch (e) {}

}

/* MOBILE SHARE */
if (navigator.canShare && navigator.canShare({ files: [file] })){

try {
  await navigator.share({
    files: [file],
    title: "Spot Sketch"
  });
  return;
} catch (e) {}

}

/* FALLBACK */
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = "spot-sketch.png";
a.click();
URL.revokeObjectURL(url);

}

/* helper */
function roundRect(ctx,x,y,w,h,r){
ctx.beginPath();
ctx.moveTo(x+r,y);
ctx.arcTo(x+w,y,x+w,y+h,r);
ctx.arcTo(x+w,y+h,x,y+h,r);
ctx.arcTo(x,y+h,x,y,r);
ctx.arcTo(x,y,x+w,y,r);
ctx.closePath();
}
</script>

</body>
</html>
